<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Mega - Магазин техники</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-center">
                <img src="https://i.postimg.cc/y8PLDDrs/podarok-16-2.png" class="logo" alt="Logo">
                <h1 class="shop-title">MegaStore Store</h1>
            </div>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." class="search-input">
        </div>

        <main id="mainContent" class="main-content">
            <div style="text-align:center; padding:50px">Загрузка...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="shop">🛍️<span>Магазин</span></button>
            <button class="nav-btn" data-page="sales">🔥<span>Акции</span></button>
            <button class="nav-btn" data-page="cart">🛒<span>Корзина</span><span id="cartBadge" class="cart-badge">0</span></button>
            <button class="nav-btn" data-page="contacts">📞<span>Контакты</span></button>
        </nav>
    </div>

    <!-- Модальное окно выбора типа покупки (Опт/Розница) -->
    <div id="purchaseTypeModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Выберите тип покупки</h3>
            </div>
            <div class="modal-body" style="text-align:center">
                <button id="retailBtn" style="background:#1a3a8c; color:#FF8C00; border:2px solid #FF8C00; padding:15px 30px; border-radius:30px; font-size:16px; font-weight:bold; margin:10px; width:80%; cursor:pointer;">🛍️ Розница (до 3 шт)</button>
                <button id="wholesaleBtn" style="background:#FF8C00; color:#1a3a8c; border:none; padding:15px 30px; border-radius:30px; font-size:16px; font-weight:bold; margin:10px; width:80%; cursor:pointer;">📦 Опт (от 3 шт одного товара)</button>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="checkoutModal" class="modal-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
